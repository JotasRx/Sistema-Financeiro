<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Controle Financeiro</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px;}
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-top: 0;}
        input { width: 100%; padding: 10px; margin: 8px 0 15px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #000000; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;}
        button:hover { background-color: #000000; }
        .links { text-align: center; margin-top: 20px; font-size: 14px; }
        .links a { color: #007BFF; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        label { font-weight: bold; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Criar Conta</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: red; text-align: center; margin-bottom: 15px; font-size: 14px;">
              {% for message in messages %}
                {{ message }}
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/cadastro" method="POST">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

            <label for="cpf_cnpj">CPF ou CNPJ (somente números):</label>
            <input type="text" id="cpf_cnpj" name="cpf_cnpj" placeholder="Ex: 12345678900" required>

            <label for="usuario">Nome de Usuário (Login):</label>
            <input type="text" id="usuario" name="usuario" placeholder="Escolha um nome de usuário" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>

            <button type="submit">Cadastrar</button>
        </form>

        <div class="links">
            <p>Já tem uma conta? <a href="/login">Faça Login</a></p>
        </div>
    </div>
</body>
</html>
